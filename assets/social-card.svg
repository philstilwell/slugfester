<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Slugfester social preview</title>
  <desc id="desc">Slugfester debate scorecards with argument scores, critique popovers, and fallacy or bias references.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#13201f" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f4f8f7" />
  <path d="M0 500h1200v130H0z" fill="#ffffff" opacity="0.82" />
  <path d="M0 0h1200v92H0z" fill="#13201f" />
  <path d="M166 92h402v8H166z" fill="#2f8f85" />
  <path d="M568 92h208v8H568z" fill="#d35d47" />

  <g transform="translate(166 78)">
    <text x="0" y="104" fill="#13201f" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="850">Slugfester</text>
    <text x="2" y="158" fill="#2f8f85" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">YouTube debate argument scorecards</text>
    <text x="2" y="220" fill="#30413e" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="650">AI-assisted scoring, critique popovers,</text>
    <text x="2" y="260" fill="#30413e" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="650">and contextual fallacy or bias references.</text>

    <g transform="translate(0 330)">
      <rect x="0" y="0" width="560" height="98" rx="8" fill="#ffffff" stroke="#d8e1de" stroke-width="2" />
      <text x="26" y="38" fill="#13201f" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Reasoning score</text>
      <rect x="26" y="58" width="230" height="14" rx="7" fill="#e2f3f0" />
      <rect x="26" y="58" width="188" height="14" rx="7" fill="#2f8f85" />
      <text x="292" y="38" fill="#13201f" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Rebuttal pressure</text>
      <rect x="292" y="58" width="230" height="14" rx="7" fill="#fae7e2" />
      <rect x="292" y="58" width="171" height="14" rx="7" fill="#d35d47" />
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="806" y="132" width="350" height="360" rx="26" fill="#ffffff" stroke="#d8e1de" stroke-width="2" />
    <text x="846" y="190" fill="#13201f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">Debate map</text>
    <rect x="846" y="226" width="270" height="18" rx="9" fill="#e2f3f0" />
    <rect x="846" y="226" width="214" height="18" rx="9" fill="#2f8f85" />
    <rect x="846" y="266" width="270" height="18" rx="9" fill="#fae7e2" />
    <rect x="846" y="266" width="188" height="18" rx="9" fill="#d35d47" />
    <rect x="846" y="322" width="112" height="96" rx="8" fill="#e2f3f0" stroke="#2f8f85" stroke-width="2" />
    <rect x="1004" y="322" width="112" height="96" rx="8" fill="#fae7e2" stroke="#d35d47" stroke-width="2" />
  </g>

  <image href="debate-gloves.png" x="14" y="102" width="150" height="150" preserveAspectRatio="xMidYMid meet" />
  <text x="166" y="54" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850">SLUGFESTER.COM</text>
</svg>
